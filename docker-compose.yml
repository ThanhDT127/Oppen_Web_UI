version: '3.8'

services:
  # PostgreSQL with PGVector extension
  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: openwebui-postgres
    environment:
      POSTGRES_USER: openwebui_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      POSTGRES_DB: openwebui
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      TZ: Asia/Ho_Chi_Minh
    # Step 2: PostgreSQL performance tuning for 32GB RAM
    command: >
      postgres -c max_connections=300 -c shared_buffers=4GB -c work_mem=16MB -c effective_cache_size=8GB -c maintenance_work_mem=256MB -c wal_buffers=64MB -c random_page_cost=1.1 -c checkpoint_completion_target=0.9
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Step 5: Port closed for security (internal only)
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U openwebui_user -d openwebui" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Step 3: Resource limits
    deploy:
      resources:
        limits: { memory: 8G, cpus: '2' }
        reservations: { memory: 4G }
    networks:
      - openwebui-network

  # Redis (for SearXNG rate limiter)
  redis:
    image: redis:7-alpine
    container_name: openwebui-redis
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 256M, cpus: '0.5' }
    networks:
      - openwebui-network

  # LiteLLM Proxy
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.14-stable
    container_name: openwebui-litellm
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/vertex.json
      - VERTEX_PROJECT=omega-dahlia-475002-r7
      - VERTEX_LOCATION=us-central1
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./litellm/litellm_config.yaml:/app/config.yaml:ro
      - ./vertex.json:/app/vertex.json:ro
      - litellm_logs:/app/logs
    # Step 1: 2 workers (reduced from 4 — vertex_ai credentials compatibility)
    command: [ "--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2" ]
    # Step 5: Port closed for security (internal only)
    # ports:
    #   - "4000:4000"
    restart: unless-stopped
    # Step 3: Resource limits
    deploy:
      resources:
        limits: { memory: 4G, cpus: '4' }
        reservations: { memory: 1G }
    networks:
      - openwebui-network

  # Middleware (Auth & Quota)
  middleware:
    build:
      context: ./llm-mw
      dockerfile: Dockerfile
    container_name: openwebui-middleware
    environment:
      - LITELLM_BASE=http://litellm:4000/v1
      - LITELLM_KEY=${LITELLM_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MW_SECRET=${MW_SECRET}
      - MW_PUBLIC_URL=https://openwebui.rangdong.com.vn:51122
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - DATABASE_URL=postgresql://openwebui_user:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/middleware
      - TZ=Asia/Ho_Chi_Minh
    volumes:
      - ./llm-mw/users.json:/app/data/users.json
      - ./llm-mw/prices.json:/app/data/prices.json:ro
      - ./llm-mw/data/alert_config.json:/app/data/alert_config.json
      - ./llm-mw/data/system_alerts.json:/app/data/system_alerts.json
      - ./llm-mw/dashboard:/app/dashboard
      - ./logs:/app/../logs
    # Port closed — accessed through Nginx
    # ports:
    #   - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    # Step 3: Resource limits
    deploy:
      resources:
        limits: { memory: 2G, cpus: '4' }
        reservations: { memory: 512M }
    networks:
      - openwebui-network

  # SearXNG - Self-hosted Meta Search Engine (Web Search for AI)
  searxng:
    image: searxng/searxng:latest
    container_name: openwebui-searxng
    volumes:
      - ./searxng:/etc/searxng:rw
      - searxng_data:/var/cache/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      - SEARXNG_REDIS_URL=redis://redis:6379/0
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080" ]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Step 3: Resource limits
    deploy:
      resources:
        limits: { memory: 1G, cpus: '1' }
    networks:
      - openwebui-network

  # Apache Tika - Document Extraction + OCR (Tesseract) — DISABLED, replaced by Docling
  # tika:
  #   image: apache/tika:latest-full
  #   container_name: openwebui-tika
  #   healthcheck:
  #     test: [ "CMD", "wget", "--spider", "-q", "http://localhost:9998/tika" ]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits: { memory: 2G, cpus: '1' }
  #   networks:
  #     - openwebui-network

  # Docling - Document Extraction (layout-aware, structured Markdown output)
  docling:
    image: quay.io/docling-project/docling-serve-cpu:latest
    container_name: openwebui-docling
    environment:
      - UVICORN_WORKERS=1
      - DOCLING_SERVE_MAX_SYNC_WAIT=600
      - DOCLING_SERVE_LOG_LEVEL=DEBUG
      - DOCLING_SERVE_DEFAULT_OCR_ENGINE=paddleocr
      - DOCLING_SERVE_DEFAULT_OCR_LANGS=vi,en
      - DOCLING_SERVE_OCR_LANGS=vi,en
      - OCR_LANGS=vi,en
      - PADDLE_LANG=vi
      - DOCLING_SERVE_IMAGE_EXPORT=true
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:5001/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 4G, cpus: '6' }
    networks:
      - openwebui-network

  # Open WebUI Application
  open-webui:
    build:
      context: .
      dockerfile: Dockerfile.openwebui
    container_name: openwebui-app
    environment:
      # Database Configuration - PostgreSQL
      - DATABASE_URL=postgresql://openwebui_user:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/openwebui

      # PGVector Configuration
      - VECTOR_DB=pgvector
      - PGVECTOR_DB_URL=postgresql://openwebui_user:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/openwebui
      - PGVECTOR_CREATE_EXTENSION=true
      - PGVECTOR_INDEX_METHOD=hnsw

      # Embeddings using Gemini via LiteLLM (openai-compatible)
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=gemini-embedding-2
      # Embedding connects through middleware for cost tracking & quota control
      - RAG_EMBEDDING_OPENAI_API_BASE_URL=http://middleware:5000/v1
      - RAG_EMBEDDING_OPENAI_API_KEY=${SUBKEY_ADMIN}

      # Reranking using Cohere via LiteLLM
      - RAG_RERANKING_ENGINE=external
      - RAG_EXTERNAL_RERANKER_URL=http://middleware:5000/v1/rerank
      - RAG_RERANKING_MODEL=cohere/rerank-v3.5
      - RAG_RERANKING_OPENAI_API_KEY=${SUBKEY_ADMIN}

      # RAG Configuration
      - ENABLE_RAG=true
      - CHUNK_SIZE=1500
      - CHUNK_OVERLAP=100
      - RAG_TEXT_SPLITTER=character
      - ENABLE_RAG_HYBRID_SEARCH=true
      - RAG_FILE_MAX_SIZE=2048
      - RAG_FILE_MAX_COUNT=20

      # Embedding batch size (reduced for Gemini API rate limits)
      - RAG_EMBEDDING_BATCH_SIZE=1

      # LLM Connection via Middleware
      - OPENAI_API_BASE_URL=http://middleware:5000/v1
      - OPENAI_API_KEY=${SUBKEY_ADMIN}

      # Web Search Configuration (SearXNG)
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
      - RAG_WEB_SEARCH_RESULT_COUNT=5
      - RAG_WEB_SEARCH_CONCURRENT_REQUESTS=1

      # Document Extraction Engine — Docling (replaces Tika)
      - CONTENT_EXTRACTION_ENGINE=docling
      - DOCLING_SERVER_URL=http://middleware:5000/docling-proxy
      - DOCLING_PARAMS={"image_export_mode":"referenced"}

      # Timezone
      - TZ=Asia/Ho_Chi_Minh

      # WebUI Settings
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - ENABLE_SIGNUP=true
      - DEFAULT_USER_ROLE=pending
      - PORT=8080

      # WebSocket Manager — required for UVICORN_WORKERS > 1 (Socket.IO state sync via Redis)
      - ENABLE_WEBSOCKET_SUPPORT=true
      - WEBSOCKET_MANAGER=redis
      - WEBSOCKET_REDIS_URL=redis://redis:6379/1

      # 6 workers for production (WebSocket coordinated via Redis)
      - UVICORN_WORKERS=6
    volumes:
      - openwebui_data:/app/backend/data
    # Port closed — accessed through Nginx
    # ports:
    #   - "3000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      middleware:
        condition: service_started
      searxng:
        condition: service_healthy
      docling:
        condition: service_healthy
    restart: unless-stopped
    # Step 3: Resource limits
    deploy:
      resources:
        limits: { memory: 10G, cpus: '6' }
        reservations: { memory: 4G }
    networks:
      - openwebui-network

  # Nginx Reverse Proxy + HTTPS
  nginx:
    image: nginx:alpine
    container_name: openwebui-nginx
    ports:
      - "3000:3000" # NAT: 51122 (public) → 3000 (server) → Nginx HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - open-webui
      - middleware
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M, cpus: '1' }
    networks:
      - openwebui-network

volumes:
  postgres_data:
    driver: local
  openwebui_data:
    driver: local
  litellm_logs:
    driver: local
  searxng_data:
    driver: local

networks:
  openwebui-network:
    driver: bridge
