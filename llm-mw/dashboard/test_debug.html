<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Login Debug</title>
</head>
<body>
    <h1>Dashboard Login Test</h1>
    <input type="password" id="key" placeholder="Admin key" value="YOUR_ADMIN_KEY">
    <button onclick="testLogin()">Test Login</button>
    <div id="result"></div>
    
    <script>
        function testLogin() {
            const key = document.getElementById('key').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = 'Testing login...';
            console.log('Calling login with key:', key);
            
            fetch('http://localhost:5000/v1/_mw/dashboard/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({admin_key: key})
            })
            .then(res => {
                console.log('Response status:', res.status);
                console.log('Response headers:', res.headers);
                return res.json();
            })
            .then(data => {
                console.log('Response data:', data);
                resultDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                // Test summary after login
                return fetch('http://localhost:5000/v1/_mw/summary?minutes=5', {
                    credentials: 'include'
                });
            })
            .then(res => res.json())
            .then(data => {
                console.log('Summary data:', data);
                resultDiv.innerHTML += '<hr><h3>Summary works!</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            })
            .catch(err => {
                console.error('Error:', err);
                resultDiv.innerHTML = '<div style="color:red">Error: ' + err.message + '</div>';
            });
        }
    </script>
</body>
</html>
