worker_processes auto;
events { worker_connections 2048; }

http {
    # ── Logging ──
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # ── Upload limit (Open WebUI file upload) ──
    client_max_body_size 100M;

    # ── Rate limiting (per IP) ──
    limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # ── Backend servers ──
    upstream webui   { server open-webui:8080; }
    upstream mw_api  { server middleware:5000; }

    # ── HTTPS Server (port 3000 — NAT 51122→3000) ──
    server {
        listen 3000 ssl;
        http2 on;
        server_name _;

        # SSL Certificate (wildcard *.example.com)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Timeout cho streaming (LLM response có thể 60s+)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Proxy buffer settings
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;

        # ── Static files (no rate limit) ──
        location /_app/ {
            proxy_pass http://webui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 1h;
        }

        location /static/ {
            proxy_pass http://webui;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
        }

        # ── WebSocket ──
        location /ws/ {
            proxy_pass http://webui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
        }

        # ── Open WebUI (trang chính) ──
        location / {
            proxy_pass http://webui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            limit_req zone=chat burst=50 nodelay;
        }

        # ── Dashboard (served by middleware at /dashboard) ──
        location /dashboard {
            proxy_pass http://mw_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Middleware API + Dashboard ──
        location /v1/_mw/ {
            proxy_pass http://mw_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;             # Required for SSE streams
            proxy_cache off;
            proxy_set_header Connection '';   # SSE needs no connection upgrade
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            limit_req zone=chat burst=20;
        }

        # ── Middleware API (LLM streaming) ──
        location /v1/ {
            proxy_pass http://mw_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # ── Login (chống brute force) ──
        location /api/v1/auths/ {
            proxy_pass http://webui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req zone=login burst=3;
        }
    }
}
