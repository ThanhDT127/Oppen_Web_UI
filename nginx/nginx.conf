worker_processes auto;
events { worker_connections 2048; }

http {
    # ── Logging ──
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # ── Upload limit (Open WebUI file upload) ──
    client_max_body_size 100M;

    # ── Connection upgrade mapping (chỉ upgrade khi client yêu cầu WebSocket) ──
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # ── Static file cache (Fix B1) ──
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=static_cache:10m
                     max_size=500m inactive=1h use_temp_path=off;

    # ── Rate limiting (per IP) ──
    limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # ── Backend servers ──
    upstream webui   { server open-webui:8080; }
    upstream mw_api  { server middleware:5000; }

    # ── HTTPS Server (port 3000 — NAT 51122→3000) ──
    server {
        listen 3000 ssl;
        http2 on;
        server_name _;

        # SSL Certificate (wildcard *.example.com)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Timeout cho streaming (LLM response có thể 60s+)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;

        # Proxy buffer settings
        proxy_buffering off;
        proxy_buffer_size 16k;
        proxy_busy_buffers_size 24k;
        proxy_buffers 64 4k;

        # ── Static files (cached, no rate limit) ──
        location /_app/ {
            proxy_pass http://webui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache static_cache;
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location = /_app/version.json {
            proxy_pass http://webui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache off;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location = /manifest.json {
            proxy_pass http://webui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache off;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        }

        location /static/ {
            proxy_pass http://webui;
            proxy_set_header Host $host;
            proxy_cache static_cache;
            proxy_cache_valid 200 1h;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── Socket.IO (WebSocket + HTTP long-polling) ──
        # Socket.IO negotiates transport: polling first → upgrade to WebSocket
        # MUST support BOTH transports, not just WebSocket upgrade
        location /ws/ {
            proxy_pass http://webui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Dynamic upgrade: only upgrade when client sends Upgrade header
            # (polling requests won't have Upgrade header → Connection stays empty)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Long timeout for persistent WebSocket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Open WebUI API (rate limit riêng, Fix B2) ──
        location /api/ {
            proxy_pass http://webui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            limit_req zone=api burst=60 nodelay;
        }

        # ── Open WebUI (trang chính) ──
        location / {
            proxy_pass http://webui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            limit_req zone=chat burst=50 nodelay;
        }

        # ── Dashboard (served by middleware at /dashboard) ──
        location /dashboard {
            proxy_pass http://mw_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Media files (images from AI generation) — cached + CORS ──
        location /v1/_mw/media/ {
            proxy_pass http://mw_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # MUST enable buffering — proxy_cache requires it
            # (parent server block sets proxy_buffering off for streaming)
            proxy_buffering on;

            # Cache immutable media files (UUID filenames never change)
            proxy_cache static_cache;
            proxy_cache_valid 200 1d;
            proxy_cache_valid 404 1m;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Cache-Control "public, max-age=86400, immutable";

            # CORS — allow any origin to load generated images
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Max-Age "86400" always;

            # Handle preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
                add_header Access-Control-Max-Age "86400";
                add_header Content-Length 0;
                add_header Content-Type "text/plain";
                return 204;
            }
        }

        # ── Middleware API + Dashboard ──
        location /v1/_mw/ {
            proxy_pass http://mw_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;             # Required for SSE streams
            proxy_cache off;
            proxy_set_header Connection '';   # SSE needs no connection upgrade
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            limit_req zone=chat burst=20;
        }

        # ── Middleware API (LLM streaming) ──
        location /v1/ {
            proxy_pass http://mw_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        # ── Login (chống brute force, Fix A1) ──
        location /api/v1/auths/ {
            proxy_pass http://webui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            limit_req zone=login burst=5 nodelay;
        }
    }
}
