  # Image generation models
  # Note: Gemini image generation requires Vertex AI Imagen API
  # For now, only DALL-E 3 is supported
  - model_name: gpt-draw-1
    litellm_params:
      model: openai/dall-e-3
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-3-pro-preview
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GEMINI_API_KEY


litellm_settings:
  drop_params: false  
  host: "0.0.0.0"
  port: 4000
  telemetry: false

general_settings:
  enable_spend_logging: false
  verbose: true
  master_key: os.environ/LITELLM_KEY
  log_level: "info"

logging:
  file: "litellm/litellm.log"
  level: INFO
