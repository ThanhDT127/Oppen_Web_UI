model_list:
  # ============================================================
  # MULTIMODAL CHAT MODELS - Text + Vision Understanding
  # ============================================================
  
  # OpenAI GPT-5 Series (Flagship - unified reasoning + multimodal)
  - model_name: chat-gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  - model_name: chat-gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: chat-gpt-5-nano
    litellm_params:
      model: openai/gpt-5-nano
      api_key: os.environ/OPENAI_API_KEY

  # OpenAI GPT-4o Series (Fast multimodal)
  - model_name: chat-gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: chat-gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # OpenAI GPT-4.1 Series (1M context window)
  - model_name: chat-gpt-4.1
    litellm_params:
      model: openai/gpt-4.1
      api_key: os.environ/OPENAI_API_KEY

  - model_name: chat-gpt-4.1-mini
    litellm_params:
      model: openai/gpt-4.1-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: chat-gpt-4.1-nano
    litellm_params:
      model: openai/gpt-4.1-nano
      api_key: os.environ/OPENAI_API_KEY

  # Google Gemini 2.5 Series (High-capability reasoning)
  - model_name: chat-gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: chat-gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: chat-gemini-2.5-flash-lite
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # Google Gemini 2.0 Series
  - model_name: chat-gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: chat-gemini-2.0-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # Google Gemini 3 Series (Latest flagship)
  - model_name: chat-gemini-3-pro
    litellm_params:
      model: gemini/gemini-3-pro-preview
      api_key: os.environ/GEMINI_API_KEY

  # ============================================================
  # IMAGE GENERATION MODELS - Create images from text
  # ============================================================
  
  # OpenAI GPT Image 1.5 (Latest, fastest, best quality - Dec 2025)
  - model_name: img-gpt-1.5
    litellm_params:
      model: openai/gpt-image-1.5
      api_key: os.environ/OPENAI_API_KEY

  # OpenAI GPT Image 1 (High quality - April 2025)
  - model_name: img-gpt-1
    litellm_params:
      model: openai/gpt-image-1
      api_key: os.environ/OPENAI_API_KEY

  # OpenAI GPT Image 1 Mini (Budget, fast)
  - model_name: img-gpt-1-mini
    litellm_params:
      model: openai/gpt-image-1-mini
      api_key: os.environ/OPENAI_API_KEY

  # OpenAI DALL-E 3
  - model_name: img-gpt-dalle-3
    litellm_params:
      model: openai/dall-e-3
      api_key: os.environ/OPENAI_API_KEY

  # Google Gemini 2.5 Flash Image (Nano Banana) - Fast, 1024px
  - model_name: img-gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash-image
      api_key: os.environ/GEMINI_API_KEY

  # Google Gemini 3 Pro Image (Nano Banana Pro) - High quality, 4K
  - model_name: img-gemini-pro
    litellm_params:
      model: gemini/gemini-3-pro-image-preview
      api_key: os.environ/GEMINI_API_KEY

  # ============================================================
  # TEXT-TO-SPEECH MODELS - Convert text to audio
  # ============================================================
  
  - model_name: tts-gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini-tts
      api_key: os.environ/OPENAI_API_KEY

  # ============================================================
  # SPEECH-TO-TEXT MODELS - Transcribe audio to text
  # ============================================================
  
  - model_name: stt-gpt-4o
    litellm_params:
      model: openai/gpt-4o-transcribe
      api_key: os.environ/OPENAI_API_KEY

  - model_name: stt-gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini-transcribe
      api_key: os.environ/OPENAI_API_KEY


# ============================================================
# LITELLM SETTINGS
# ============================================================

litellm_settings:
  drop_params: false  
  host: "0.0.0.0"
  port: 4000
  telemetry: false

general_settings:
  enable_spend_logging: false
  verbose: true
  master_key: os.environ/LITELLM_KEY
  log_level: "info"

logging:
  file: "litellm/litellm.log"
  level: INFO
